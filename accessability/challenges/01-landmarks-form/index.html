<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge 1: Landmarks and Form</title>
  <style>
    body {
      font-family: Georgia, serif;
      margin: 0;
      color: #6f6f6f;
      background: #fafafa;
    }
    .topbar {
      background: #ececec;
      padding: 12px;
    }
    .menu-item {
      display: inline-block;
      margin-right: 16px;
      color: #7d7d7d;
      cursor: pointer;
    }
    .card {
      max-width: 700px;
      margin: 24px auto;
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
    }
    input, button {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 16px;
      padding: 10px;
      border: 1px solid #ddd;
    }
    *:focus {
      outline: none;
    }
    .tiny {
      font-size: 12px;
      color: #9d9d9d;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="menu-item" onclick="location.href='#'">Home</div>
    <div class="menu-item" onclick="location.href='#'">Pricing</div>
    <div class="menu-item" onclick="location.href='#'">Contact</div>
  </div>

  <div class="card">
    <h3>Weekly Newsletter</h3>
    <h1>Sign Up</h1>

    <form>
      <input type="text" name="fullName" placeholder="Full name">
      <div class="tiny">Use your legal name.</div>

      <input type="email" name="email" placeholder="Email">
      <div class="tiny">We will never spam you.</div>

      <input type="password" name="password" placeholder="Password">
      <div class="tiny">At least 8 characters.</div>

      <button type="submit">Create account</button>
    </form>
  </div>

  <div class="topbar">Copyright Example Co.</div>
</body>
</html>
