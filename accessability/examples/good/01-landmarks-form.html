<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reference 1: Landmarks and Form</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --brand: #005fcc;
      --ring: #005fcc;
      --border: #d1d5db;
    }
    body {
      margin: 0;
      font-family: "Trebuchet MS", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .skip-link {
      position: absolute;
      left: 8px;
      top: -48px;
      background: #111827;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      z-index: 999;
    }
    .skip-link:focus {
      top: 8px;
    }
    header, footer {
      background: #e8eef7;
      padding: 12px 20px;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 16px;
    }
    main {
      max-width: 720px;
      margin: 24px auto;
      background: var(--surface);
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
    }
    .field {
      margin-bottom: 14px;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }
    input, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 1rem;
    }
    .help {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }
    button {
      background: var(--brand);
      color: white;
      border: none;
      font-weight: 700;
      cursor: pointer;
    }
    :focus-visible {
      outline: 3px solid var(--ring);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header>
    <nav aria-label="Primary">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <h1>Sign Up for Weekly Newsletter</h1>
    <p>Get curated links once a week.</p>

    <form>
      <div class="field">
        <label for="fullName">Full name</label>
        <input id="fullName" name="fullName" type="text" autocomplete="name" aria-describedby="name-help" required>
        <p id="name-help" class="help">Use your legal name.</p>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input id="email" name="email" type="email" autocomplete="email" aria-describedby="email-help" required>
        <p id="email-help" class="help">We send one email per week.</p>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" aria-describedby="pw-help" required>
        <p id="pw-help" class="help">At least 8 characters.</p>
      </div>

      <button type="submit">Create account</button>
    </form>
  </main>

  <footer>
    <small>Copyright Example Co.</small>
  </footer>
</body>
</html>
